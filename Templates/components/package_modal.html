<div id="packageModal" class="package-modal">

    <div class="package-modal-content">

        <span class="close-package" onclick="closePackage()">&times;</span>

        <img id="packageImage" src="" alt="Package Image">

        <div class="package-info">

            <h2 id="packageTitle"></h2>

            <p id="packagePrice"></p>

            <p id="packageDuration"></p>

            <p id="packageRoute"></p>

            <h3>Package Includes</h3>

            <ul id="packageIncludes"></ul>

            <button class="book-btn" onclick="bookSelectedPackage()">

                Book This Package

            </button>

        </div>

    </div>

</div>
